name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            chords-ui/package-lock.json

      - name: Build chord data
        run: npm ci && npm run build

      - name: Copy data to Angular assets
        run: cp lib/*.json chords-ui/public/data/

      - name: Build Angular app
        run: |
          cd chords-ui
          npm ci
          npx ng build --base-href /chords-db/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: chords-ui/dist/chords-ui/browser

      - uses: actions/deploy-pages@v4
        id: deploy
